server:
  port: 9001
spring:
  application:
    ## 指定服务名称，在nacos中的名字
    name: xiaobai-up-rbac
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/xiaobai_up?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: root1003
  cloud:
    nacos:
      discovery:
        # nacos的服务地址，nacos-server中IP地址:端口号
        server-addr: 127.0.0.1:8848
  swagger:
    basePackage: me.zeanzai.rbac.controller
    author:
      name: zeanzai.me
      email: zeanzai.me@gmail.com
      url: https://zeanzai.me
    apiInfo:
      title: 权限模块
      description: 系统用户、系统菜单、系统角色等模块相关接口
      version: 1.0
      termsOfServiceUrl: http://ip:${server.port}/${spring.application.name}
      license: license
      licenseUrl: licenseUrl

mybatis:
  type-aliases-package: me.zeanzai.rbac.entity
  mapper-locations: classpath:mybatis/*.xml


management:
  endpoints:
    web:
      exposure:
        ## yml文件中存在特殊字符，必须用单引号包含，否则启动报错
        include: '*'